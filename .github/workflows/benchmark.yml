name: Performance Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'benchmarks.yaml'
      - '.github/workflows/benchmark.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'benchmarks.yaml'
  schedule:
    # Run benchmarks daily at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.mod

      - name: Build benchmarks
        run: |
          make build
          ls -lh bin/

      - name: Start mock server
        run: |
          ./bin/mockserver --port 9000 &
          sleep 2
          curl -f http://localhost:9000/health

      - name: Create .env for benchmarks
        run: |
          cat > .env <<'EOF'
          FERROGATEWAY_URL=http://localhost:8080
          FERROGATEWAY_API_KEY=mock-key
          LITELLM_URL=http://localhost:4000
          LITELLM_API_KEY=mock-key
          MODEL=gpt-4o-mini
          MOCK_SERVER_URL=http://localhost:9000
          EOF

      - name: Start FerroGateway
        run: |
          docker pull ghcr.io/ferro-labs/ai-gateway:latest
          docker run -d \
            --name ferrogateway \
            --network host \
            -e GATEWAY_CONFIG=/etc/ferrogw/config.yaml \
            -e OPENAI_BASE_URL=http://localhost:9000/v1 \
            -e OPENAI_API_KEY=mock-key \
            -v ${{ github.workspace }}/configs/ferrogateway.config.yaml:/etc/ferrogw/config.yaml:ro \
            ghcr.io/ferro-labs/ai-gateway:latest
          sleep 5
          curl -f http://localhost:8080/health || (docker logs ferrogateway && exit 1)

      - name: Create CI LiteLLM config
        run: |
          cat > /tmp/litellm-ci.yaml <<'EOF'
          model_list:
            - model_name: gpt-4o-mini
              litellm_params:
                model: openai/gpt-4o-mini
                api_key: mock-key
                api_base: http://localhost:9000/v1

          general_settings:
            master_key: mock-key
          EOF

      - name: Start LiteLLM
        run: |
          docker pull ghcr.io/berriai/litellm:main-stable
          docker run -d \
            --name litellm \
            --network host \
            -e OPENAI_API_KEY=mock-key \
            -v /tmp/litellm-ci.yaml:/app/config.yaml:ro \
            ghcr.io/berriai/litellm:main-stable \
            --config /app/config.yaml --port 4000
          sleep 10
          curl -f http://localhost:4000/health/liveliness || curl -f http://localhost:4000/ || (docker logs litellm && exit 1)

      - name: Run smoke test (FerroGateway + LiteLLM)
        run: |
          ./bin/bench \
            -config benchmarks.yaml \
            -dotenv .env \
            -out-dir results \
            -gateways ferrogateway,litellm \
            -scenarios smoke \
            -repeat 1

      - name: Run baseline benchmark
        run: |
          ./bin/bench \
            -config benchmarks.yaml \
            -dotenv .env \
            -out-dir results \
            -gateways ferrogateway,litellm \
            -scenarios baseline \
            -repeat 1

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Benchmark Results\n\n';
            
            if (!fs.existsSync('results')) {
              comment += 'No benchmark results directory found.';
            } else {
              const files = fs.readdirSync('results').filter(f => f.endsWith('.md'));
              if (files.length > 0) {
                const mdContent = fs.readFileSync(`results/${files[0]}`, 'utf8');
                comment += mdContent;
              } else {
                comment += 'No benchmark results found.';
              }
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Clean up containers
        if: always()
        run: |
          docker stop ferrogateway litellm 2>/dev/null || true
          docker rm ferrogateway litellm 2>/dev/null || true
          kill $(lsof -t -i:9000) 2>/dev/null || true
