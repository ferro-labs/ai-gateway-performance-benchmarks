# AI Gateway Performance Benchmarks — Docker Compose
#
# Spins up all gateways + a local mock server so benchmarks measure
# gateway overhead only, not live LLM latency.
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose up -d --profile kong  # also start Kong
#   python scripts/run_benchmarks.py --gateways ferrogateway,litellm
#
# Requires: OPENAI_API_KEY in your shell environment (used by LiteLLM
# to configure its OpenAI model list; irrelevant when mock server is used).
#
# When MOCK_SERVER_URL is set in .env each gateway's config should route
# to http://mock-server:9000 instead of https://api.openai.com.
# The ferrogateway and litellm services below use the mock by default.
# For real OpenAI tests, remove or override the upstream env vars.

services:
  # -----------------------------------------------------------------------
  # Local mock server — returns instant fixed responses.
  # Eliminates upstream LLM latency from measurements.
  # -----------------------------------------------------------------------
  mock-server:
    image: python:3.12-slim
    command: python /app/scripts/mock_server.py --port 9000
    volumes:
      - .:/app:ro
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -----------------------------------------------------------------------
  # Ferro AI Gateway (product under test)
  # -----------------------------------------------------------------------
  ferrogateway:
    build:
      context: ../ai-gateway
      dockerfile: Dockerfile
    image: ferrogateway:bench
    environment:
      GATEWAY_CONFIG: /etc/ferrogw/config.yaml
      # Point OpenAI provider to the mock server
      OPENAI_BASE_URL: http://mock-server:9000/v1
      OPENAI_API_KEY: mock-key
    volumes:
      - ./configs/ferrogateway.config.yaml:/etc/ferrogw/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -----------------------------------------------------------------------
  # LiteLLM proxy
  # -----------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./configs/litellm.mock.config.yaml:/app/config.yaml:ro
    environment:
      OPENAI_API_KEY: mock-key
    ports:
      - "4000:4000"
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------------------
  # Kong AI Gateway (DB-less, in an optional profile to keep compose fast)
  # Enable with: docker compose --profile kong up -d
  # -----------------------------------------------------------------------
  kong:
    image: kong:3.6
    profiles:
      - kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/null
      KONG_ADMIN_ACCESS_LOG: /dev/null
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./configs/kong.mock.yaml:/etc/kong/kong.yaml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
