# AI Gateway Performance Benchmarks — Docker Compose
#
# Spins up all gateways + a local mock server so benchmarks measure
# gateway overhead only, not live LLM latency.
#
# Core services (always started):
#   mock-server, ferrogateway, litellm
#
# Optional profiles (started with make setup / make up-kong / make up-portkey):
#   --profile kong     → Kong AI Gateway (DB-less)
#   --profile portkey  → Portkey open-source gateway
#
# Quick start:
#   make setup    — pull latest, build, start everything, wait healthy
#   make bench-all — run all benchmarks
#   make clean    — stop + remove containers/images/results/venv
#
# Images are always pulled at their latest tag on 'make setup'.
# mock-server is built locally from Go source via Dockerfile.mockserver.

services:
  # -----------------------------------------------------------------------
  # Local mock server — returns instant fixed responses.
  # Eliminates upstream LLM latency from measurements.
  # Built from Go source via Dockerfile.mockserver (multi-stage).
  # -----------------------------------------------------------------------
  mock-server:
    build:
      context: .
      dockerfile: Dockerfile.mockserver
    image: bench-mockserver:latest
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -----------------------------------------------------------------------
  # Ferro AI Gateway (product under test)
  # Pulled from the official GHCR image — always latest on 'make setup'.
  # -----------------------------------------------------------------------
  ferrogateway:
    image: ghcr.io/ferro-labs/ai-gateway:latest
    pull_policy: always
    environment:
      GATEWAY_CONFIG: /etc/ferrogw/config.yaml
      # Point OpenAI provider to the mock server (isolated overhead mode)
      OPENAI_BASE_URL: http://mock-server:9000/v1
      OPENAI_API_KEY: mock-key
    volumes:
      - ./configs/ferrogateway.config.yaml:/etc/ferrogw/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -----------------------------------------------------------------------
  # LiteLLM proxy — always pulls latest stable image on 'make setup'
  # -----------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    pull_policy: always
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./configs/litellm.mock.config.yaml:/app/config.yaml:ro
    environment:
      OPENAI_API_KEY: mock-key
    ports:
      - "4000:4000"
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------------------
  # Kong AI Gateway (DB-less declarative config)
  # Enable with: make up-kong  or  make setup  (always included in setup)
  # -----------------------------------------------------------------------
  kong:
    image: kong:latest
    pull_policy: always
    profiles:
      - kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/null
      KONG_ADMIN_ACCESS_LOG: /dev/null
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./configs/kong.mock.yaml:/etc/kong/kong.yaml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------------------
  # Portkey open-source gateway
  # Enable with: make up-portkey  or  make setup  (always included in setup)
  #
  # Requests route to the mock server via the x-portkey-custom-host header
  # set in benchmarks.yaml. The 'mock-server' hostname resolves within the
  # Docker network, so overhead measurements remain isolated.
  # -----------------------------------------------------------------------
  portkey:
    image: portkeyai/gateway:latest
    pull_policy: always
    profiles:
      - portkey
    ports:
      - "8787:8787"
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      # TCP check — portkey (Node.js) has no dedicated /health endpoint
      test: ["CMD", "node", "-e",
             "require('net').createConnection(8787,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
