# Benchmark matrix for gateway comparison.
# Fill URLs/keys via environment variables from .env (see .env.example).
#
# This file controls Go benchmark runner (cmd/bench/main.go).
# For high-VU throughput tests (k6) and peak RPS measurement (wrk), see:
#   k6/chat_completions.js   — baseline, stress, peak_5k scenarios
#   wrk/chat_completions.lua — peak RPS ceiling
#
# Add a new gateway: add an entry under `gateways:`.
# Add a new scenario: add an entry under `scenarios:`.
# No code changes needed.

gateways:
  ferrogateway:
    base_url: ${FERROGATEWAY_URL}
    api_key: ${FERROGATEWAY_API_KEY}
    request_path: /v1/chat/completions
    model: ${MODEL}

  bifrost:
    base_url: ${BIFROST_URL}
    api_key: ${BIFROST_API_KEY}
    request_path: /v1/chat/completions
    model: ${BIFROST_MODEL}

  litellm:
    base_url: ${LITELLM_URL}
    api_key: ${LITELLM_API_KEY}
    request_path: /v1/chat/completions
    model: ${MODEL}

  kong:
    base_url: ${KONG_URL}
    api_key: ${KONG_API_KEY}
    request_path: /v1/chat/completions
    model: ${MODEL}

  portkey:
    base_url: ${PORTKEY_URL}
    api_key: ${PORTKEY_API_KEY}
    request_path: /v1/chat/completions
    model: ${MODEL}
    disable_keepalive: true
    extra_headers:
      # Tell Portkey to route upstream requests to the local mock server.
      # Set PORTKEY_UPSTREAM_URL= in .env to skip the override (real upstream).
      x-portkey-provider: openai
      x-portkey-custom-host: ${PORTKEY_UPSTREAM_URL}

scenarios:
  - name: smoke
    users: 10
    spawn_rate: 2
    warmup_duration: 30s  # Allow connections to establish and caches to warm
    duration: 2m
    prompt: "Explain API gateway benchmarking in one sentence."
    max_tokens: 64
    # wait_time: [0, 0]  # [min_wait_ms, max_wait_ms] between requests per user

  - name: baseline
    users: 50
    spawn_rate: 10
    warmup_duration: 60s  # 1 minute warmup for connection pooling/JIT
    duration: 10m
    prompt: "Return one line: benchmarking gateways under equal load."
    max_tokens: 64

  - name: stress
    users: 150
    spawn_rate: 20
    warmup_duration: 60s
    duration: 10m
    prompt: "Return one short line with 10 words about latency percentiles."
    max_tokens: 64

  - name: streaming-baseline
    users: 50
    spawn_rate: 10
    warmup_duration: 60s
    duration: 10m
    prompt: "Write three short sentences about distributed systems."
    max_tokens: 128
    stream: true
    # Tests chunked SSE transfer performance and time-to-first-token

  - name: streaming-stress
    users: 100
    spawn_rate: 15
    warmup_duration: 60s
    duration: 10m
    prompt: "Write three short sentences about distributed systems."
    max_tokens: 128
    stream: true

  - name: high-concurrency-500
    users: 500
    spawn_rate: 50
    warmup_duration: 10s
    duration: 2m
    prompt: "Return one word."
    max_tokens: 4

  - name: high-concurrency-1000
    users: 1000
    spawn_rate: 100
    warmup_duration: 10s
    duration: 2m
    prompt: "Return one word."
    max_tokens: 4

  # ── Competitor-comparable scenarios ──────────────────────────────────────

  # Primary comparison — matches Bifrost's published test exactly
  - name: bifrost-comparable-500rps
    users: 50
    spawn_rate: 10
    target_rps: 500
    warmup_duration: 60s
    duration: 5m
    prompt: "Return one short sentence."
    max_tokens: 64
    notes: "Matches Bifrost: 500 RPS, 50 VUs, 60ms mock upstream"

  # Matches Kong's test (high concurrency)
  - name: kong-comparable-stress
    users: 200
    spawn_rate: 30
    target_rps: 2000
    warmup_duration: 60s
    duration: 5m
    prompt: "Return one short sentence."
    max_tokens: 64
    notes: "High concurrency stress matching Kong's EKS benchmark profile"

  # Bifrost stress test level
  - name: stress-5krps
    users: 300
    spawn_rate: 50
    target_rps: 5000
    warmup_duration: 60s
    duration: 3m
    prompt: "Return one short sentence."
    max_tokens: 64
    notes: "Bifrost claims 11µs overhead and 100% success at this level"

  # Throughput ceiling — find our max RPS
  - name: throughput-ceiling
    users: 500
    spawn_rate: 50
    warmup_duration: 60s
    duration: 3m
    prompt: "Return one short sentence."
    max_tokens: 32
    notes: "Ramp to find saturation point of each gateway"

  # Streaming comparison
  - name: streaming-comparison
    users: 50
    spawn_rate: 10
    warmup_duration: 60s
    duration: 5m
    prompt: "Write three short sentences about distributed systems."
    max_tokens: 128
    stream: true
    notes: "SSE streaming overhead comparison"
