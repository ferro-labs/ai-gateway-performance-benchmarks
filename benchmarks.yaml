# Benchmark matrix for gateway comparison.
# Fill URLs/keys via environment variables from .env (see .env.example).
#
# This file controls Go benchmark runner (cmd/bench/main.go).
# For high-VU throughput tests (k6) and peak RPS measurement (wrk), see:
#   k6/chat_completions.js   — baseline, stress, peak_5k scenarios
#   wrk/chat_completions.lua — peak RPS ceiling
#
# Add a new gateway: add an entry under `gateways:`.
# Add a new scenario: add an entry under `scenarios:`.
# No code changes needed.

gateways:
  ferrogateway:
    base_url: ${FERROGATEWAY_URL}
    api_key: ${FERROGATEWAY_API_KEY}
    request_path: /v1/chat/completions
    model: ${MODEL}

  bifrost:
    base_url: ${BIFROST_URL}
    api_key: ${BIFROST_API_KEY}
    request_path: /v1/chat/completions
    model: ${MODEL}

  litellm:
    base_url: ${LITELLM_URL}
    api_key: ${LITELLM_API_KEY}
    request_path: /v1/chat/completions
    model: ${MODEL}

  kong:
    base_url: ${KONG_URL}
    api_key: ${KONG_API_KEY}
    request_path: /v1/chat/completions
    model: ${MODEL}

  portkey:
    base_url: ${PORTKEY_URL}
    api_key: ${PORTKEY_API_KEY}
    request_path: /v1/chat/completions
    model: ${MODEL}
    extra_headers:
      # Tell the Portkey self-hosted container to route upstream requests to
      # the local mock server (Docker-internal hostname: mock-server).
      # Set PORTKEY_UPSTREAM_URL= in .env to skip the override (real upstream).
      x-portkey-provider: openai
      x-portkey-custom-host: ${PORTKEY_UPSTREAM_URL}

scenarios:
  - name: smoke
    users: 10
    spawn_rate: 2
    warmup_duration: 30s  # Allow connections to establish and caches to warm
    duration: 2m
    prompt: "Explain API gateway benchmarking in one sentence."
    max_tokens: 64
    # wait_time: [0, 0]  # [min_wait_ms, max_wait_ms] between requests per user

  - name: baseline
    users: 50
    spawn_rate: 10
    warmup_duration: 60s  # 1 minute warmup for connection pooling/JIT
    duration: 10m
    prompt: "Return one line: benchmarking gateways under equal load."
    max_tokens: 64

  - name: stress
    users: 150
    spawn_rate: 20
    warmup_duration: 60s
    duration: 10m
    prompt: "Return one short line with 10 words about latency percentiles."
    max_tokens: 64

  - name: streaming-baseline
    users: 50
    spawn_rate: 10
    warmup_duration: 60s
    duration: 10m
    prompt: "Write three short sentences about distributed systems."
    max_tokens: 128
    stream: true
    # Tests chunked SSE transfer performance and time-to-first-token

  - name: streaming-stress
    users: 100
    spawn_rate: 15
    warmup_duration: 60s
    duration: 10m
    prompt: "Write three short sentences about distributed systems."
    max_tokens: 128
    stream: true
