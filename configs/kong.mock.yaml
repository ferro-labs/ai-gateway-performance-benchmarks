# Kong DB-less declarative config for isolated mock-server benchmarking.
# Routes /v1/chat/completions to the local mock server — no auth plugins
# needed since the mock accepts any request.
#
# Used by the kong service in docker-compose.yml.
# For real OpenAI testing, use configs/kong.deck.yaml with deck sync.
_format_version: "3.0"
_transform: true

services:
  - name: llm-mock-upstream
    url: http://mock-server:9000
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: chat-completions
        paths:
          - /v1/chat/completions
        methods:
          - POST
        strip_path: false
