# LiteLLM Proxy — Benchmark Config
# Version: 1.82.6
# Hardware: GCP n2-standard-8 (8 vCPU, 32GB RAM), Debian 12
# Started by: litellm --config configs/litellm.native.config.yaml --port 4000
# Tuning: default configuration, no custom tuning applied
# Upstream: http://localhost:9000/v1 (60ms mock server)
# Install: pip install litellm[proxy]==1.82.6
# Auth: master_key set to allow benchmark runner requests
#
# LiteLLM proxy config for native-process benchmarking.
# Points to mock server on localhost:9000 (no Docker networking).
# For Docker mode, use litellm.mock.config.yaml instead.
model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: mock-key
      api_base: http://localhost:9000/v1
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: mock-key
      api_base: http://localhost:9000/v1

general_settings:
  master_key: mock-key
