# LiteLLM proxy config for native-process benchmarking.
# Points to mock server on localhost:9000 (no Docker networking).
# For Docker mode, use litellm.mock.config.yaml instead.
model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: mock-key
      api_base: http://localhost:9000/v1
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: mock-key
      api_base: http://localhost:9000/v1

general_settings:
  master_key: mock-key
