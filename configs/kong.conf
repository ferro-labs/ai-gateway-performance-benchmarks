# Kong AI Gateway OSS — Benchmark Config
# Version: 3.9.1
# Hardware: GCP n2-standard-8 (8 vCPU, 32GB RAM), Debian 12
# Started by: scripts/run-benchmarks.sh (see start_kong())
# Tuning: default configuration, no custom tuning applied
# Upstream: http://localhost:9000 (60ms mock server)
# Mode: dbless declarative config
#
# Kong native benchmark configuration (DB-less, no Postgres).
#
# Start manually:
#   KONG_DECLARATIVE_CONFIG=$(pwd)/configs/kong.yaml kong start -c configs/kong.conf
#
# NOTE: declarative_config requires an absolute path. The run-benchmarks.sh
# script sets KONG_DECLARATIVE_CONFIG automatically.

prefix = /tmp/kong-bench
database = off
proxy_listen = 0.0.0.0:8000
admin_listen = 0.0.0.0:8001
proxy_access_log = off
admin_access_log = off
proxy_error_log = /dev/stderr
admin_error_log = /dev/stderr
