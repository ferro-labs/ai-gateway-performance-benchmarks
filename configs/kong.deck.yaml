# Declarative Kong config for benchmarking.
# Apply with: deck gateway sync configs/kong.deck.yaml
#
# This config:
#  - Routes /v1/chat/completions to https://api.openai.com
#  - Uses key-auth to authenticate the benchmark client
#  - Injects the upstream OpenAI key via request-transformer
#    so OpenAI receives a valid Authorization header
_format_version: "3.0"
services:
  - name: llm-upstream
    url: https://api.openai.com
    routes:
      - name: llm-route
        paths:
          - /v1/chat/completions
        strip_path: false
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
            - Authorization
          hide_credentials: true
      - name: request-transformer
        config:
          add:
            headers:
              # Replace with your actual OpenAI key or use a Kong env var
              - "Authorization:Bearer ${OPENAI_API_KEY}"
consumers:
  - username: benchmark-user
    keyauth_credentials:
      - key: ${KONG_API_KEY}
