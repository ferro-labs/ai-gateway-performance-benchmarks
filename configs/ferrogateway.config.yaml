# Ferro Labs AI Gateway — Benchmark Config
# Version: v1.0.0
# Hardware: GCP n2-standard-8 (8 vCPU, 32GB RAM), Debian 12
# Started by: scripts/run-benchmarks.sh (see start_ferrogateway())
# Tuning: default configuration, no custom tuning applied
# Upstream: http://localhost:9000 (60ms mock server)
#
# Ferro Labs AI Gateway config for benchmark comparison.
# Run: ferrogw --config configs/ferrogateway.config.yaml
#
# This config exposes a single OpenAI-compatible upstream via Ferro Labs AI Gateway,
# matching what LiteLLM and Kong are configured to do in this benchmark.
strategy:
  mode: single

targets:
  - virtual_key: openai

# To use the local mock server instead of real OpenAI (recommended for
# isolated overhead benchmarking), set the upstream URL to the mock:
#   OPENAI_BASE_URL=http://mock-server:9000
# and set a dummy API key.
